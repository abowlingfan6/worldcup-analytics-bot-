name: World Cup Bot

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run bot
        run: python worldcup_bot.py

      - name: Commit updated CSV
        run: |
          git config --global user.name "worldcup-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add data/worldcup_ratings.csv
          git commit -m "update ratings" || echo "no changes"
          git push
